services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    platform: linux/arm64
    ports:
      - "5678:5678"
    environment:
      GENERIC_TIMEZONE: Asia/Jakarta
      TZ: Asia/Jakarta
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_RUNNERS_ENABLED: "true"
      N8N_HOST: localhost
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
volumes:
  n8n_data:
